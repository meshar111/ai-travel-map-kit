<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ستايلستك الذكي | فهد العساف</title>
<style>
:root{--ink:#231821;--muted:#735f6b;--line:#eadde5;--rose:#d9447f;--mint:#198c78;--paper:#fffaf7;--white:#fff;--shadow:0 24px 70px rgba(72,41,61,.14)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 8% 8%,rgba(255,221,235,.9),transparent 25rem),radial-gradient(circle at 90% 12%,rgba(210,242,255,.9),transparent 24rem),linear-gradient(135deg,#fff8fb 0%,#f8fcff 42%,#fff8ed 100%);color:var(--ink);font-family:"Segoe UI",Tahoma,Arial,sans-serif}button,input,select,textarea{font:inherit}.app-shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px}.hero{min-height:420px;display:grid;grid-template-columns:minmax(320px,.95fr) minmax(300px,1.05fr);gap:34px;align-items:center}.hero-media{min-height:370px;border:1px solid rgba(217,68,127,.16);border-radius:8px;background:linear-gradient(120deg,rgba(255,255,255,.72),rgba(255,255,255,.25)),radial-gradient(circle at 22% 24%,#ffd5e6,transparent 9rem),radial-gradient(circle at 80% 26%,#c8efff,transparent 8rem),radial-gradient(circle at 36% 80%,#ffe6a8,transparent 11rem);box-shadow:var(--shadow);position:relative;overflow:hidden}.hero-media:before,.hero-media:after{content:"";position:absolute;border-radius:8px;background:var(--white);border:1px solid rgba(35,24,33,.08)}.hero-media:before{width:210px;height:260px;right:58px;top:54px;transform:rotate(-4deg)}.hero-media:after{width:150px;height:190px;left:54px;bottom:54px;transform:rotate(5deg)}.tablet{position:absolute;z-index:1;width:min(76%,390px);left:50%;top:50%;transform:translate(-50%,-50%);padding:32px;border-radius:8px;background:rgba(255,255,255,.92);border:1px solid var(--line);box-shadow:0 18px 42px rgba(72,41,61,.14);display:grid;gap:14px}.tablet span,.eyebrow{color:var(--rose);font-weight:900}.tablet strong{font-size:34px;line-height:1.15}.tablet small{color:var(--muted);font-weight:800}.hero-copy{display:grid;gap:16px}.eyebrow,h1,h2,p{margin:0}.eyebrow{font-size:14px}h1{font-size:clamp(36px,6vw,66px);line-height:1.08}.hero-copy p:last-child{color:var(--muted);font-size:19px;line-height:1.8;max-width:650px}.workspace{display:grid;grid-template-columns:.86fr 1.14fr;gap:22px;align-items:start}.panel,.results{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:8px;box-shadow:0 16px 44px rgba(72,41,61,.08)}.panel{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;position:sticky;top:18px}.field{display:grid;gap:8px}.field-wide{grid-column:1/-1}label{font-size:13px;color:var(--muted);font-weight:900}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:var(--white);color:var(--ink);padding:12px 13px;outline:none}textarea{resize:vertical;min-height:92px}input:focus,select:focus,textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(217,68,127,.12)}button{min-height:48px;border:0;border-radius:8px;background:var(--ink);color:var(--white);font-weight:900;cursor:pointer}.panel button{grid-column:1/-1}button:hover{filter:brightness(1.08)}.results{padding:20px;min-height:520px}.result-header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.result-header h2{font-size:24px}#copyAll{background:var(--rose);padding:0 18px;white-space:nowrap}.outfit-grid{display:grid;gap:14px}.outfit-card{border:1px solid var(--line);border-radius:8px;background:var(--paper);padding:18px;display:grid;gap:12px}.outfit-card:nth-child(2){background:#f7feff}.outfit-card:nth-child(3){background:#fffbf0}.outfit-top{display:flex;justify-content:space-between;gap:12px;align-items:start}.outfit-top h3{margin:0;font-size:22px}.badge{min-width:78px;text-align:center;padding:7px 10px;border-radius:999px;background:rgba(25,140,120,.12);color:var(--mint);font-size:13px;font-weight:900}.outfit-card p{color:var(--muted);line-height:1.75}.chips{display:flex;gap:8px;flex-wrap:wrap}.chips span{border:1px solid var(--line);border-radius:999px;background:var(--white);padding:7px 10px;font-size:13px;color:var(--muted);font-weight:800}@media (max-width:820px){.app-shell{width:min(100% - 20px,680px);padding-top:12px}.hero,.workspace{grid-template-columns:1fr}.hero{min-height:auto;gap:20px}.hero-media{min-height:260px}.tablet{width:82%;padding:24px}.tablet strong{font-size:28px}.panel{position:static;grid-template-columns:1fr}.result-header{align-items:stretch;flex-direction:column}#copyAll{width:100%}}
</style>
</head>
<body>
<main class="app-shell">
<section class="hero"><div class="hero-media"><div class="tablet"><span>ستايلستك الذكي</span><strong>3 لوكات جاهزة</strong><small>@Alassafme</small></div></div><div class="hero-copy"><p class="eyebrow">تجربة مجانية</p><h1>ستايلست ذكي يطلع لك لوك كامل حسب مناسبتك</h1><p>اكتبي المناسبة والمدينة والستايل والقطع اللي عندك، وخذي 3 تنسيقات جاهزة مع الشنطة والحذاء والمكياج والإكسسوارات.</p></div></section>
<section class="workspace"><form id="plannerForm" class="panel"><div class="field"><label for="occasion">المناسبة</label><input id="occasion" name="occasion" value="زواج" placeholder="مثال: زواج، سفر، جامعة" /></div><div class="field"><label for="city">المدينة</label><input id="city" name="city" value="الرياض" placeholder="مثال: الرياض، جدة، دبي" /></div><div class="field"><label for="style">الستايل المفضل</label><select id="style" name="style"><option value="soft">ناعم وفخم</option><option value="practical">عملي ومرتب</option><option value="bold">جريء وأنيق</option><option value="modest">محتشم وراقي</option></select></div><div class="field"><label for="budget">الميزانية</label><select id="budget" name="budget"><option value="low">اقتصادية</option><option value="medium" selected>متوسطة</option><option value="high">فخمة</option></select></div><div class="field field-wide"><label for="items">القطع اللي عندك</label><textarea id="items" name="items" rows="3" placeholder="مثال: فستان أسود، عباية بيج، حذاء فضي، شنطة صغيرة">فستان أسود، حذاء فضي، شنطة صغيرة</textarea></div><button type="submit">طلعي التنسيقات</button></form><section class="results" aria-live="polite"><div class="result-header"><div><p class="eyebrow">النتيجة</p><h2>اقتراحات جاهزة للتجربة</h2></div><button id="copyAll" type="button">نسخ النتيجة</button></div><div id="outfits" class="outfit-grid"></div></section></section>
</main>
<script>
const form=document.querySelector('#plannerForm'),outfitsEl=document.querySelector('#outfits'),copyAllButton=document.querySelector('#copyAll');
const styleProfiles={soft:{label:'ناعم وفخم',colors:['أسود','أوف وايت','وردي باهت','ذهبي خفيف'],texture:'قماش ناعم مع لمعة بسيطة',makeup:'مكياج ناعم بدرجات وردية وإضاءة خفيفة'},practical:{label:'عملي ومرتب',colors:['كحلي','أبيض','رمادي','زيتي'],texture:'قصة مريحة وخامة سهلة الحركة',makeup:'مكياج يومي مرتب وحواجب طبيعية'},bold:{label:'جريء وأنيق',colors:['عنابي','أسود','فضي','أخضر زمردي'],texture:'قطعة بارزة مع تفاصيل معدنية',makeup:'آيلاينر واضح وروج أغمق بدرجة أنيقة'},modest:{label:'محتشم وراقي',colors:['بيج','بني هادئ','أخضر فاتح','أسود'],texture:'طبقات مرتبة وقصة واسعة',makeup:'مكياج هادئ وبشرة مضيئة'}};
const budgetProfiles={low:{label:'اقتصادية',shopping:'استخدمي أغلب القطع الموجودة واشتري قطعة واحدة فقط تكمل اللوك',accessory:'إكسسوار بسيط يرفع الشكل بدون تكلفة عالية'},medium:{label:'متوسطة',shopping:'اخلطي قطعة أساسية من دولابك مع قطعة جديدة بجودة جيدة',accessory:'شنطة أو حذاء بدرجة محايدة يخدمك أكثر من مرة'},high:{label:'فخمة',shopping:'اختاري قطعة أساسية بجودة عالية وخلي باقي التنسيق هادئ',accessory:'إكسسوار معدني أو شنطة صغيرة تعطي اللوك قيمة أعلى'}};
const occasionRules=[{match:['زواج','ملكة','خطوبة','عرس'],base:'فستان ميدي أو طويل بقصة مرتبة',hair:'ويفي ناعم أو كعكة منخفضة',note:'خلي اللمعة في قطعة واحدة فقط عشان اللوك يبقى راقي'},{match:['جامعة','دوام','عمل','مقابلة'],base:'بنطال واسع أو تنورة مريحة مع بلوزة مرتبة',hair:'شعر مرتب أو ذيل حصان منخفض',note:'اختاري حذاء مريح لأن اليوم غالبًا طويل'},{match:['سفر','مطار','رحلة'],base:'طقم مريح بطبقات خفيفة',hair:'تسريحة بسيطة ما تتعب مع الحركة',note:'خلي الشنطة عملية وفيها مساحة للجوال والجواز'},{match:['كافيه','مطعم','عزيمة','طلعة'],base:'قطعة علوية مميزة مع جينز أو تنورة هادئة',hair:'ويفي سريع أو شعر مفرود',note:'اللوك يكون جميل بالتصوير ومريح في نفس الوقت'},{match:['عيد','تخرج','مناسبة'],base:'طقم أنثوي مرتب مع لون واضح',hair:'تسريحة فيها حجم خفيف',note:'اختاري لون يطلع حلو في الصور والإضاءة'}];
function findOccasionRule(occasion){return occasionRules.find(rule=>rule.match.some(word=>occasion.trim().includes(word)))||occasionRules[occasionRules.length-1]}function pick(arr,index){return arr[index%arr.length]}
function getData(){const fd=new FormData(form);return{occasion:fd.get('occasion')||'مناسبة',city:fd.get('city')||'',style:fd.get('style')||'soft',budget:fd.get('budget')||'medium',items:fd.get('items')||''}}
function createOutfits(data){const profile=styleProfiles[data.style],budget=budgetProfiles[data.budget],occasion=findOccasionRule(data.occasion),items=data.items.split(/[،,\n]/).map(i=>i.trim()).filter(Boolean),cityHint=data.city?`مناسب لـ ${data.city}`:'مناسب للمدينة المختارة';return[0,1,2].map(index=>{const color=pick(profile.colors,index),ownedItem=items[index]||items[0]||'قطعة أساسية من دولابك',shoe=index===0?'حذاء بلون محايد':index===1?'هيل ناعم أو باليرينا':'حذاء بلون معدني خفيف',bag=index===0?'شنطة صغيرة':index===1?'شنطة كتف عملية':'كلتش مرتب';return{title:['لوك ناعم','لوك عملي','لوك ملفت'][index],badge:cityHint,description:`${occasion.base} بدرجة ${color} مع ${ownedItem}. الخامة المقترحة: ${profile.texture}.`,details:[`الحذاء: ${shoe}`,`الشنطة: ${bag}`,`المكياج: ${profile.makeup}`,`الشعر: ${occasion.hair}`,`الميزانية: ${budget.shopping}`],tip:`${budget.accessory}. ${occasion.note}.`}})}
function renderOutfits(outfits){outfitsEl.innerHTML=outfits.map(outfit=>`<article class="outfit-card"><div class="outfit-top"><h3>${outfit.title}</h3><span class="badge">${outfit.badge}</span></div><p>${outfit.description}</p><div class="chips">${outfit.details.map(detail=>`<span>${detail}</span>`).join('')}</div><p>${outfit.tip}</p></article>`).join('')}
function resultText(){const data=getData(),outfits=createOutfits(data);return[`ستايلستك الذكي - ${data.occasion} في ${data.city}`,`الستايل: ${styleProfiles[data.style].label}`,`الميزانية: ${budgetProfiles[data.budget].label}`,'',...outfits.flatMap((outfit,index)=>[`${index+1}. ${outfit.title}`,outfit.description,...outfit.details,outfit.tip,'']),'بواسطة فهد العساف @Alassafme'].join('\n')}
function update(){renderOutfits(createOutfits(getData()))}form.addEventListener('submit',e=>{e.preventDefault();update()});copyAllButton.addEventListener('click',async()=>{await navigator.clipboard.writeText(resultText());copyAllButton.textContent='تم النسخ';setTimeout(()=>copyAllButton.textContent='نسخ النتيجة',1400)});update();
</script>
</body>
</html>
